apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd  # ← Argo CD watches this
spec:
  project: default
  source:
    repoURL: https://github.com/5a-lil/khadj-me-IoT-repo  # ← YOUR EXACT REPO
    targetRevision: main
    path: manifests  # ← YOUR manifests/ folder
  destination:
    server: https://kubernetes.default.svc  # ← Local cluster
    namespace: dev  # ← Deploy to dev namespace
  syncPolicy:
    automated:  # ← AUTO UPDATE ON GIT PUSH!
      prune: true
      selfHeal: true
