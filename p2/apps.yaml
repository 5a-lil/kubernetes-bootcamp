---
# Ingress — HOST routing rules
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: # just metadata
  name: apps-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web # get interest in this weird key/value
spec:
  # IT DOESNT WORKS K3S INGRESS OVERRIDES IT
  # defaultBackend: # default service -> default route
  #  service:
  #    name: app3-svc
  #  port:
  #      number: 80 # published port of the service
  rules: # route rules for http
  - host: app1.com # domaine
    http:
      paths:
      - path: / # route
        pathType: Prefix # match type
        backend: 
          service:
            name: app1-svc # service name
            port:
              number: 80 # service published port
  - host: app2.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app2-svc
            port:
              number: 80
  - host: _
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app3-svc
            port:
              number: 80

